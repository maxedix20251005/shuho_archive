<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2780" viewBox="0 0 1440 2780">
  <defs>
    <style>
      .bg { fill: #f5f5f5; }
      .frame { fill: #ffffff; stroke: #222; stroke-width: 2; }
      .sec { fill: #fafafa; stroke: #555; stroke-width: 1.5; }
      .label { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 22px; fill: #111; font-weight: 700; }
      .sub { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 16px; fill: #444; }
      .tiny { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 14px; fill: #666; }
      .card { fill: #fff; stroke: #777; stroke-width: 1.2; }
      .thumb { fill: #f0f0f0; stroke: #999; stroke-dasharray: 6 4; }
      .line { stroke: #999; stroke-width: 1.2; }
      .chip { fill: #f1f1f1; stroke: #999; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="2780" />
  <rect class="frame" x="120" y="40" width="1200" height="2700" rx="8" />

  <text x="140" y="28" class="sub">サブページ ワイヤーフレーム（PC）- 生徒募集</text>

  <!-- Header -->
  <rect class="sec" x="140" y="70" width="1160" height="90" />
  <text x="165" y="124" class="label">1. ヘッダー（ロゴ / グローバルナビ）</text>
  <rect class="card" x="165" y="92" width="170" height="46" rx="4" />
  <text x="183" y="121" class="sub">ロゴ</text>
  <rect class="card" x="470" y="92" width="800" height="46" rx="4" />
  <text x="490" y="121" class="sub">NAV: ホーム | 塾について | 師範 | コース | 作品 | FAQ | アクセス | お問い合わせ</text>

  <!-- Hero -->
  <rect class="sec" x="140" y="180" width="1160" height="230" />
  <text x="165" y="222" class="label">2. ページヒーロー（生徒募集）</text>
  <rect class="thumb" x="170" y="248" width="1100" height="130" />
  <text x="720" y="318" class="sub" text-anchor="middle">現在の募集状況と受け入れ枠</text>

  <!-- 状態 Summary -->
  <rect class="sec" x="140" y="430" width="1160" height="210" />
  <text x="165" y="472" class="label">3. 募集状況サマリー</text>
  <rect class="card" x="170" y="502" width="355" height="110" />
  <rect class="card" x="542" y="502" width="355" height="110" />
  <rect class="card" x="914" y="502" width="355" height="110" />
  <text x="347" y="542" class="tiny" text-anchor="middle">こども：募集中 / 空き待ち</text>
  <text x="719" y="542" class="tiny" text-anchor="middle">一般：募集中 / 空き待ち</text>
  <text x="1091" y="542" class="tiny" text-anchor="middle">資格：募集中 / 空き待ち</text>

  <!-- Requirements Table -->
  <rect class="sec" x="140" y="660" width="1160" height="420" />
  <text x="165" y="702" class="label">4. 募集要件・条件</text>
  <rect class="card" x="170" y="732" width="1100" height="320" />
  <line class="line" x1="170" y1="782" x2="1270" y2="782" />
  <line class="line" x1="170" y1="842" x2="1270" y2="842" />
  <line class="line" x1="170" y1="902" x2="1270" y2="902" />
  <line class="line" x1="170" y1="962" x2="1270" y2="962" />
  <text x="190" y="764" class="tiny">カテゴリ</text>
  <text x="420" y="764" class="tiny">対象条件</text>
  <text x="660" y="764" class="tiny">定員</text>
  <text x="860" y="764" class="tiny">開始時期</text>
  <text x="1060" y="764" class="tiny">備考</text>

  <!-- Annual 日程 -->
  <rect class="sec" x="140" y="1100" width="1160" height="320" />
  <text x="165" y="1142" class="label">5. 年間募集スケジュール</text>
  <rect class="card" x="170" y="1172" width="1100" height="220" />
  <text x="190" y="1210" class="tiny">春期 / 夏期 / 秋期 / 冬期 の募集タイムライン</text>
  <rect class="chip" x="190" y="1240" width="180" height="30" rx="15" />
  <rect class="chip" x="390" y="1240" width="180" height="30" rx="15" />
  <rect class="chip" x="590" y="1240" width="180" height="30" rx="15" />
  <rect class="chip" x="790" y="1240" width="180" height="30" rx="15" />

  <!-- Admission Flow -->
  <rect class="sec" x="140" y="1440" width="1160" height="280" />
  <text x="165" y="1482" class="label">6. 入塾までの流れ</text>
  <rect class="card" x="170" y="1512" width="260" height="180" />
  <rect class="card" x="450" y="1512" width="260" height="180" />
  <rect class="card" x="730" y="1512" width="260" height="180" />
  <rect class="card" x="1010" y="1512" width="260" height="180" />
  <text x="300" y="1604" class="tiny" text-anchor="middle">問い合わせ</text>
  <text x="580" y="1604" class="tiny" text-anchor="middle">受講相談</text>
  <text x="860" y="1604" class="tiny" text-anchor="middle">内容確認</text>
  <text x="1140" y="1604" class="tiny" text-anchor="middle">入塾手続き</text>

  <!-- FAQ -->
  <rect class="sec" x="140" y="1740" width="1160" height="260" />
  <text x="165" y="1782" class="label">7. 募集FAQ</text>
  <rect class="card" x="170" y="1812" width="1100" height="56" />
  <rect class="card" x="170" y="1878" width="1100" height="56" />
  <rect class="card" x="170" y="1944" width="1100" height="56" />
  <text x="190" y="1846" class="tiny">Q. 初心者でもすぐに入塾できますか？</text>
  <text x="190" y="1912" class="tiny">Q. 空き待ちの手順はありますか？</text>
  <text x="190" y="1978" class="tiny">Q. 入塾時に必要な書類はありますか？</text>

  <!-- お問い合わせ Strip -->
  <rect class="sec" x="140" y="2020" width="1160" height="160" />
  <text x="165" y="2062" class="label">8. お問い合わせ導線</text>
  <rect class="card" x="170" y="2082" width="1100" height="78" />
  <text x="190" y="2128" class="tiny">入塾相談：お問い合わせフォーム / 電話</text>

  <!-- Footer -->
  <rect class="sec" x="140" y="2200" width="1160" height="170" />
  <text x="165" y="2242" class="label">9. フッター</text>
  <line class="line" x1="170" y1="2260" x2="1270" y2="2260" />
  <text x="170" y="2302" class="tiny">お問い合わせ | 電話 | プライバシーポリシー | サイトマップ</text>

  <!-- 備考 -->
  <rect class="card" x="140" y="2390" width="1160" height="340" />
  <text x="165" y="2430" class="label">レイアウト注記</text>
  <text x="165" y="2462" class="tiny">- 問い合わせミスマッチ防止のため募集状況を先頭表示</text>
  <text x="165" y="2490" class="tiny">- 流れ説明の前に時期・要件を見せる</text>
  <text x="165" y="2518" class="tiny">- 現プロジェクトでは問い合わせ中心のコンバージョン設計を維持</text>
  <text x="165" y="2546" class="tiny">- 他サブページと構成ルールを統一</text>
</svg>





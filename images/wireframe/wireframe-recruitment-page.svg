<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2780" viewBox="0 0 1440 2780">
  <defs>
    <style>
      .bg { fill: #f5f5f5; }
      .frame { fill: #ffffff; stroke: #222; stroke-width: 2; }
      .sec { fill: #fafafa; stroke: #555; stroke-width: 1.5; }
      .label { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 22px; fill: #111; font-weight: 700; }
      .sub { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 16px; fill: #444; }
      .tiny { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 14px; fill: #666; }
      .card { fill: #fff; stroke: #777; stroke-width: 1.2; }
      .thumb { fill: #f0f0f0; stroke: #999; stroke-dasharray: 6 4; }
      .line { stroke: #999; stroke-width: 1.2; }
      .chip { fill: #f1f1f1; stroke: #999; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="2780" />
  <rect class="frame" x="120" y="40" width="1200" height="2700" rx="8" />

  <text x="140" y="28" class="sub">Sub Page Wireframe (PC) - Recruitment Page</text>

  <!-- Header -->
  <rect class="sec" x="140" y="70" width="1160" height="90" />
  <text x="165" y="124" class="label">1. Header (Logo / Global Navigation)</text>
  <rect class="card" x="165" y="92" width="170" height="46" rx="4" />
  <text x="183" y="121" class="sub">LOGO</text>
  <rect class="card" x="470" y="92" width="800" height="46" rx="4" />
  <text x="490" y="121" class="sub">NAV: Home | About | Masters | Courses | Portfolio | FAQ | Access | Contact</text>

  <!-- Hero -->
  <rect class="sec" x="140" y="180" width="1160" height="230" />
  <text x="165" y="222" class="label">2. Page Hero (Recruitment)</text>
  <rect class="thumb" x="170" y="248" width="1100" height="130" />
  <text x="720" y="318" class="sub" text-anchor="middle">Current enrollment information and openings</text>

  <!-- Status Summary -->
  <rect class="sec" x="140" y="430" width="1160" height="210" />
  <text x="165" y="472" class="label">3. Recruitment Status Summary</text>
  <rect class="card" x="170" y="502" width="355" height="110" />
  <rect class="card" x="542" y="502" width="355" height="110" />
  <rect class="card" x="914" y="502" width="355" height="110" />
  <text x="347" y="542" class="tiny" text-anchor="middle">Kids: Open / Waiting</text>
  <text x="719" y="542" class="tiny" text-anchor="middle">Adults: Open / Waiting</text>
  <text x="1091" y="542" class="tiny" text-anchor="middle">Certification: Open / Waiting</text>

  <!-- Requirements Table -->
  <rect class="sec" x="140" y="660" width="1160" height="420" />
  <text x="165" y="702" class="label">4. Requirements and Conditions</text>
  <rect class="card" x="170" y="732" width="1100" height="320" />
  <line class="line" x1="170" y1="782" x2="1270" y2="782" />
  <line class="line" x1="170" y1="842" x2="1270" y2="842" />
  <line class="line" x1="170" y1="902" x2="1270" y2="902" />
  <line class="line" x1="170" y1="962" x2="1270" y2="962" />
  <text x="190" y="764" class="tiny">Category</text>
  <text x="420" y="764" class="tiny">Eligibility</text>
  <text x="660" y="764" class="tiny">Capacity</text>
  <text x="860" y="764" class="tiny">Start Timing</text>
  <text x="1060" y="764" class="tiny">Notes</text>

  <!-- Annual Schedule -->
  <rect class="sec" x="140" y="1100" width="1160" height="320" />
  <text x="165" y="1142" class="label">5. Annual Enrollment Schedule</text>
  <rect class="card" x="170" y="1172" width="1100" height="220" />
  <text x="190" y="1210" class="tiny">Spring intake / Summer intake / Autumn intake / Winter intake timeline</text>
  <rect class="chip" x="190" y="1240" width="180" height="30" rx="15" />
  <rect class="chip" x="390" y="1240" width="180" height="30" rx="15" />
  <rect class="chip" x="590" y="1240" width="180" height="30" rx="15" />
  <rect class="chip" x="790" y="1240" width="180" height="30" rx="15" />

  <!-- Admission Flow -->
  <rect class="sec" x="140" y="1440" width="1160" height="280" />
  <text x="165" y="1482" class="label">6. Admission Process</text>
  <rect class="card" x="170" y="1512" width="260" height="180" />
  <rect class="card" x="450" y="1512" width="260" height="180" />
  <rect class="card" x="730" y="1512" width="260" height="180" />
  <rect class="card" x="1010" y="1512" width="260" height="180" />
  <text x="300" y="1604" class="tiny" text-anchor="middle">Inquiry</text>
  <text x="580" y="1604" class="tiny" text-anchor="middle">Counseling</text>
  <text x="860" y="1604" class="tiny" text-anchor="middle">Confirmation</text>
  <text x="1140" y="1604" class="tiny" text-anchor="middle">Enrollment</text>

  <!-- FAQ -->
  <rect class="sec" x="140" y="1740" width="1160" height="260" />
  <text x="165" y="1782" class="label">7. Recruitment FAQ</text>
  <rect class="card" x="170" y="1812" width="1100" height="56" />
  <rect class="card" x="170" y="1878" width="1100" height="56" />
  <rect class="card" x="170" y="1944" width="1100" height="56" />
  <text x="190" y="1846" class="tiny">Q. Can beginners enroll directly?</text>
  <text x="190" y="1912" class="tiny">Q. Is there a waiting list process?</text>
  <text x="190" y="1978" class="tiny">Q. What documents are required for enrollment?</text>

  <!-- Contact Strip -->
  <rect class="sec" x="140" y="2020" width="1160" height="160" />
  <text x="165" y="2062" class="label">8. Contact Strip</text>
  <rect class="card" x="170" y="2082" width="1100" height="78" />
  <text x="190" y="2128" class="tiny">Need enrollment guidance? Contact form / phone</text>

  <!-- Footer -->
  <rect class="sec" x="140" y="2200" width="1160" height="170" />
  <text x="165" y="2242" class="label">9. Footer</text>
  <line class="line" x1="170" y1="2260" x2="1270" y2="2260" />
  <text x="170" y="2302" class="tiny">Contact | Phone | Privacy Policy | Sitemap</text>

  <!-- Notes -->
  <rect class="card" x="140" y="2390" width="1160" height="340" />
  <text x="165" y="2430" class="label">Layout Notes</text>
  <text x="165" y="2462" class="tiny">- Show recruitment status first to reduce inquiry mismatch.</text>
  <text x="165" y="2490" class="tiny">- Keep timeline and requirements visible before process details.</text>
  <text x="165" y="2518" class="tiny">- Maintain contact-oriented conversion by current project scope.</text>
  <text x="165" y="2546" class="tiny">- Keep structure consistent with other subpages.</text>
</svg>

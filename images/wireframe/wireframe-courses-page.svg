<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2820" viewBox="0 0 1440 2820">
  <defs>
    <style>
      .bg { fill: #f5f5f5; }
      .frame { fill: #ffffff; stroke: #222; stroke-width: 2; }
      .sec { fill: #fafafa; stroke: #555; stroke-width: 1.5; }
      .label { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 22px; fill: #111; font-weight: 700; }
      .sub { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 16px; fill: #444; }
      .tiny { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 14px; fill: #666; }
      .card { fill: #fff; stroke: #777; stroke-width: 1.2; }
      .thumb { fill: #f0f0f0; stroke: #999; stroke-dasharray: 6 4; }
      .line { stroke: #999; stroke-width: 1.2; }
      .chip { fill: #f1f1f1; stroke: #999; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="2820" />
  <rect class="frame" x="120" y="40" width="1200" height="2740" rx="8" />

  <text x="140" y="28" class="sub">Sub Page Wireframe (PC) - Courses Page</text>

  <!-- Header -->
  <rect class="sec" x="140" y="70" width="1160" height="90" />
  <text x="165" y="124" class="label">1. Header (Logo / Global Navigation)</text>
  <rect class="card" x="165" y="92" width="170" height="46" rx="4" />
  <text x="183" y="121" class="sub">LOGO</text>
  <rect class="card" x="470" y="92" width="800" height="46" rx="4" />
  <text x="490" y="121" class="sub">NAV: Home | About | Masters | Courses | Portfolio | FAQ | Access | Contact</text>

  <!-- Hero -->
  <rect class="sec" x="140" y="180" width="1160" height="230" />
  <text x="165" y="222" class="label">2. Page Hero (Courses and Fees)</text>
  <rect class="thumb" x="170" y="248" width="1100" height="130" />
  <text x="720" y="318" class="sub" text-anchor="middle">Find the right course by purpose and schedule</text>

  <!-- Course Tabs -->
  <rect class="sec" x="140" y="430" width="1160" height="150" />
  <text x="165" y="472" class="label">3. Course Category Tabs</text>
  <rect class="chip" x="170" y="510" width="260" height="42" rx="21" />
  <rect class="chip" x="450" y="510" width="260" height="42" rx="21" />
  <rect class="chip" x="730" y="510" width="260" height="42" rx="21" />
  <rect class="chip" x="1010" y="510" width="260" height="42" rx="21" />
  <text x="300" y="536" class="tiny" text-anchor="middle">Kids Calligraphy</text>
  <text x="580" y="536" class="tiny" text-anchor="middle">Adult Practical</text>
  <text x="860" y="536" class="tiny" text-anchor="middle">Certification</text>
  <text x="1140" y="536" class="tiny" text-anchor="middle">Cultural Experience</text>

  <!-- Courses Cards -->
  <rect class="sec" x="140" y="600" width="1160" height="430" />
  <text x="165" y="642" class="label">4. Course Cards</text>
  <rect class="card" x="170" y="672" width="355" height="330" />
  <rect class="card" x="542" y="672" width="355" height="330" />
  <rect class="card" x="914" y="672" width="355" height="330" />
  <text x="190" y="707" class="sub">Kids Course</text>
  <text x="562" y="707" class="sub">Adult Course</text>
  <text x="934" y="707" class="sub">Certification Course</text>
  <text x="190" y="735" class="tiny">Target: elementary / junior high</text>
  <text x="562" y="735" class="tiny">Target: beginners / workers</text>
  <text x="934" y="735" class="tiny">Target: exam-oriented learners</text>
  <rect class="chip" x="190" y="760" width="90" height="24" rx="12" />
  <rect class="chip" x="562" y="760" width="90" height="24" rx="12" />
  <rect class="chip" x="934" y="760" width="90" height="24" rx="12" />
  <text x="235" y="777" class="tiny" text-anchor="middle">Monthly</text>
  <text x="607" y="777" class="tiny" text-anchor="middle">Monthly</text>
  <text x="979" y="777" class="tiny" text-anchor="middle">Monthly</text>

  <!-- Fee Table -->
  <rect class="sec" x="140" y="1050" width="1160" height="390" />
  <text x="165" y="1092" class="label">5. Fees and Schedule Table</text>
  <rect class="card" x="170" y="1122" width="1100" height="290" />
  <line class="line" x1="170" y1="1172" x2="1270" y2="1172" />
  <line class="line" x1="170" y1="1232" x2="1270" y2="1232" />
  <line class="line" x1="170" y1="1292" x2="1270" y2="1292" />
  <text x="190" y="1154" class="tiny">Course</text>
  <text x="430" y="1154" class="tiny">Target</text>
  <text x="640" y="1154" class="tiny">Schedule</text>
  <text x="900" y="1154" class="tiny">Fee</text>
  <text x="1070" y="1154" class="tiny">Materials</text>

  <!-- Enrollment Flow -->
  <rect class="sec" x="140" y="1460" width="1160" height="280" />
  <text x="165" y="1502" class="label">6. Enrollment Flow</text>
  <rect class="card" x="170" y="1532" width="240" height="170" />
  <rect class="card" x="430" y="1532" width="240" height="170" />
  <rect class="card" x="690" y="1532" width="240" height="170" />
  <rect class="card" x="950" y="1532" width="320" height="170" />
  <text x="290" y="1622" class="tiny" text-anchor="middle">Inquiry</text>
  <text x="550" y="1622" class="tiny" text-anchor="middle">Counseling</text>
  <text x="810" y="1622" class="tiny" text-anchor="middle">Class Start</text>
  <text x="1110" y="1622" class="tiny" text-anchor="middle">Follow-up</text>

  <!-- FAQ Snippet -->
  <rect class="sec" x="140" y="1760" width="1160" height="230" />
  <text x="165" y="1802" class="label">7. Pricing and Attendance FAQ</text>
  <rect class="card" x="170" y="1832" width="1100" height="55" />
  <rect class="card" x="170" y="1897" width="1100" height="55" />
  <text x="190" y="1865" class="tiny">Q. Is material rental available for beginners?</text>
  <text x="190" y="1930" class="tiny">Q. How are absence and makeup classes handled?</text>

  <!-- Contact Strip -->
  <rect class="sec" x="140" y="2010" width="1160" height="160" />
  <text x="165" y="2052" class="label">8. Contact Strip</text>
  <rect class="card" x="170" y="2072" width="1100" height="78" />
  <text x="190" y="2118" class="tiny">Need guidance? Contact form / phone support</text>

  <!-- Footer -->
  <rect class="sec" x="140" y="2190" width="1160" height="170" />
  <text x="165" y="2232" class="label">9. Footer</text>
  <line class="line" x1="170" y1="2250" x2="1270" y2="2250" />
  <text x="170" y="2292" class="tiny">Contact | Phone | Privacy Policy | Sitemap</text>

  <!-- Notes -->
  <rect class="card" x="140" y="2380" width="1160" height="380" />
  <text x="165" y="2420" class="label">Layout Notes</text>
  <text x="165" y="2452" class="tiny">- Make pricing and schedule scannable within one viewport block.</text>
  <text x="165" y="2480" class="tiny">- Keep uncertainty reduction elements (materials, attendance rules) near fee table.</text>
  <text x="165" y="2508" class="tiny">- Avoid trial-specific CTA by scope; focus on inquiry guidance.</text>
  <text x="165" y="2536" class="tiny">- Maintain visual consistency with top/about/masters pages.</text>
</svg>

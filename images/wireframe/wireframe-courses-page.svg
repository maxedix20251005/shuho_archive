<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2820" viewBox="0 0 1440 2820">
  <defs>
    <style>
      .bg { fill: #f5f5f5; }
      .frame { fill: #ffffff; stroke: #222; stroke-width: 2; }
      .sec { fill: #fafafa; stroke: #555; stroke-width: 1.5; }
      .label { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 22px; fill: #111; font-weight: 700; }
      .sub { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 16px; fill: #444; }
      .tiny { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 14px; fill: #666; }
      .card { fill: #fff; stroke: #777; stroke-width: 1.2; }
      .thumb { fill: #f0f0f0; stroke: #999; stroke-dasharray: 6 4; }
      .line { stroke: #999; stroke-width: 1.2; }
      .chip { fill: #f1f1f1; stroke: #999; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="2820" />
  <rect class="frame" x="120" y="40" width="1200" height="2740" rx="8" />

  <text x="140" y="28" class="sub">サブページ ワイヤーフレーム（PC）- コース</text>

  <!-- Header -->
  <rect class="sec" x="140" y="70" width="1160" height="90" />
  <text x="165" y="124" class="label">1. ヘッダー（ロゴ / グローバルナビ）</text>
  <rect class="card" x="165" y="92" width="170" height="46" rx="4" />
  <text x="183" y="121" class="sub">ロゴ</text>
  <rect class="card" x="470" y="92" width="800" height="46" rx="4" />
  <text x="490" y="121" class="sub">NAV: ホーム | 塾について | 師範 | コース | 作品 | FAQ | アクセス | お問い合わせ</text>

  <!-- Hero -->
  <rect class="sec" x="140" y="180" width="1160" height="230" />
  <text x="165" y="222" class="label">2. ページヒーロー（コース・料金）</text>
  <rect class="thumb" x="170" y="248" width="1100" height="130" />
  <text x="720" y="318" class="sub" text-anchor="middle">目的・通塾時間に合うコースを選べる構成</text>

  <!-- コース Tabs -->
  <rect class="sec" x="140" y="430" width="1160" height="150" />
  <text x="165" y="472" class="label">3. コースカテゴリタブ</text>
  <rect class="chip" x="170" y="510" width="260" height="42" rx="21" />
  <rect class="chip" x="450" y="510" width="260" height="42" rx="21" />
  <rect class="chip" x="730" y="510" width="260" height="42" rx="21" />
  <rect class="chip" x="1010" y="510" width="260" height="42" rx="21" />
  <text x="300" y="536" class="tiny" text-anchor="middle">こども書道</text>
  <text x="580" y="536" class="tiny" text-anchor="middle">一般実用</text>
  <text x="860" y="536" class="tiny" text-anchor="middle">資格取得</text>
  <text x="1140" y="536" class="tiny" text-anchor="middle">文化教養</text>

  <!-- コース Cards -->
  <rect class="sec" x="140" y="600" width="1160" height="430" />
  <text x="165" y="642" class="label">4. コースカード</text>
  <rect class="card" x="170" y="672" width="355" height="330" />
  <rect class="card" x="542" y="672" width="355" height="330" />
  <rect class="card" x="914" y="672" width="355" height="330" />
  <text x="190" y="707" class="sub">こどもコース</text>
  <text x="562" y="707" class="sub">一般コース</text>
  <text x="934" y="707" class="sub">資格取得 コース</text>
  <text x="190" y="735" class="tiny">対象：小学生 / 中学生</text>
  <text x="562" y="735" class="tiny">対象：初心者 / 社会人</text>
  <text x="934" y="735" class="tiny">対象：受験・検定志向</text>
  <rect class="chip" x="190" y="760" width="90" height="24" rx="12" />
  <rect class="chip" x="562" y="760" width="90" height="24" rx="12" />
  <rect class="chip" x="934" y="760" width="90" height="24" rx="12" />
  <text x="235" y="777" class="tiny" text-anchor="middle">月謝</text>
  <text x="607" y="777" class="tiny" text-anchor="middle">月謝</text>
  <text x="979" y="777" class="tiny" text-anchor="middle">月謝</text>

  <!-- 料金 Table -->
  <rect class="sec" x="140" y="1050" width="1160" height="390" />
  <text x="165" y="1092" class="label">5. 料金・日程テーブル</text>
  <rect class="card" x="170" y="1122" width="1100" height="290" />
  <line class="line" x1="170" y1="1172" x2="1270" y2="1172" />
  <line class="line" x1="170" y1="1232" x2="1270" y2="1232" />
  <line class="line" x1="170" y1="1292" x2="1270" y2="1292" />
  <text x="190" y="1154" class="tiny">コース</text>
  <text x="430" y="1154" class="tiny">対象</text>
  <text x="640" y="1154" class="tiny">日程</text>
  <text x="900" y="1154" class="tiny">料金</text>
  <text x="1070" y="1154" class="tiny">教材</text>

  <!-- 入塾手続き Flow -->
  <rect class="sec" x="140" y="1460" width="1160" height="280" />
  <text x="165" y="1502" class="label">6. 入会フロー</text>
  <rect class="card" x="170" y="1532" width="240" height="170" />
  <rect class="card" x="430" y="1532" width="240" height="170" />
  <rect class="card" x="690" y="1532" width="240" height="170" />
  <rect class="card" x="950" y="1532" width="320" height="170" />
  <text x="290" y="1622" class="tiny" text-anchor="middle">問い合わせ</text>
  <text x="550" y="1622" class="tiny" text-anchor="middle">受講相談</text>
  <text x="810" y="1622" class="tiny" text-anchor="middle">受講開始</text>
  <text x="1110" y="1622" class="tiny" text-anchor="middle">フォロー</text>

  <!-- FAQ Snippet -->
  <rect class="sec" x="140" y="1760" width="1160" height="230" />
  <text x="165" y="1802" class="label">7. 料金・通塾FAQ</text>
  <rect class="card" x="170" y="1832" width="1100" height="55" />
  <rect class="card" x="170" y="1897" width="1100" height="55" />
  <text x="190" y="1865" class="tiny">Q. 初心者向けの道具レンタルはありますか？</text>
  <text x="190" y="1930" class="tiny">Q. 欠席時の振替は可能ですか？</text>

  <!-- お問い合わせ Strip -->
  <rect class="sec" x="140" y="2010" width="1160" height="160" />
  <text x="165" y="2052" class="label">8. お問い合わせ導線</text>
  <rect class="card" x="170" y="2072" width="1100" height="78" />
  <text x="190" y="2118" class="tiny">受講相談：お問い合わせフォーム / 電話サポート</text>

  <!-- Footer -->
  <rect class="sec" x="140" y="2190" width="1160" height="170" />
  <text x="165" y="2232" class="label">9. フッター</text>
  <line class="line" x1="170" y1="2250" x2="1270" y2="2250" />
  <text x="170" y="2292" class="tiny">お問い合わせ | 電話 | プライバシーポリシー | サイトマップ</text>

  <!-- 備考 -->
  <rect class="card" x="140" y="2380" width="1160" height="380" />
  <text x="165" y="2420" class="label">レイアウト注記</text>
  <text x="165" y="2452" class="tiny">- 料金と日程を1画面で把握しやすくする</text>
  <text x="165" y="2480" class="tiny">- 教材・通塾ルールは料金表近くに置く</text>
  <text x="165" y="2508" class="tiny">- スコープ上、体験体験申込導線は置かず問い合わせ誘導に集中</text>
  <text x="165" y="2536" class="tiny">- トップ / 塾について / 師範ページと視覚整合を保つ</text>
</svg>





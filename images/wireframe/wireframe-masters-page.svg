<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2270" viewBox="0 0 1440 2270">
  <defs>
    <style>
      .bg { fill: #f5f5f5; }
      .frame { fill: #ffffff; stroke: #222; stroke-width: 2; }
      .sec { fill: #fafafa; stroke: #555; stroke-width: 1.5; }
      .label { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 22px; fill: #111; font-weight: 700; }
      .sub { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 16px; fill: #444; }
      .tiny { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 14px; fill: #666; }
      .card { fill: #fff; stroke: #777; stroke-width: 1.2; }
      .thumb { fill: #f0f0f0; stroke: #999; stroke-dasharray: 6 4; }
      .line { stroke: #999; stroke-width: 1.2; }
      .chip { fill: #f1f1f1; stroke: #999; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="2270" />
  <rect class="frame" x="120" y="40" width="1200" height="2190" rx="8" />

  <text x="140" y="28" class="sub">サブページ ワイヤーフレーム（PC）- 師範紹介</text>

  <!-- Header -->
  <rect class="sec" x="140" y="70" width="1160" height="90" />
  <text x="165" y="124" class="label">1. ヘッダー（ロゴ / グローバルナビ）</text>
  <rect class="card" x="165" y="92" width="170" height="46" rx="4" />
  <text x="183" y="121" class="sub">ロゴ</text>
  <rect class="card" x="470" y="92" width="800" height="46" rx="4" />
  <text x="490" y="121" class="sub">NAV: ホーム | 塾について | 師範 | コース | 作品 | FAQ | アクセス | お問い合わせ</text>

  <!-- Hero -->
  <rect class="sec" x="140" y="180" width="1160" height="250" />
  <text x="165" y="222" class="label">2. ページヒーロー（師範紹介）</text>
  <rect class="thumb" x="170" y="248" width="1100" height="150" />
  <text x="720" y="328" class="sub" text-anchor="middle">師範と指導スタイル紹介</text>

  <!-- 絞り込み / Intro -->
  <rect class="sec" x="140" y="450" width="1160" height="170" />
  <text x="165" y="492" class="label">3. 導入文 + 絞り込みチップ</text>
  <rect class="card" x="170" y="512" width="1100" height="78" />
  <text x="190" y="542" class="tiny">経験豊富な師範が、初心者にも分かりやすく指導します</text>
  <rect class="chip" x="190" y="553" width="120" height="28" rx="14" />
  <rect class="chip" x="320" y="553" width="120" height="28" rx="14" />
  <rect class="chip" x="450" y="553" width="120" height="28" rx="14" />
  <rect class="chip" x="580" y="553" width="140" height="28" rx="14" />
  <text x="220" y="572" class="tiny">初心者</text>
  <text x="350" y="572" class="tiny">資格取得</text>
  <text x="480" y="572" class="tiny">こども</text>
  <text x="617" y="572" class="tiny">一般</text>

  <!-- 師範紹介 Grid Row 1 -->
  <rect class="sec" x="140" y="640" width="1160" height="430" />
  <text x="165" y="682" class="label">4. 師範カード（1段目）</text>
  <rect class="card" x="170" y="712" width="355" height="330" />
  <rect class="card" x="542" y="712" width="355" height="330" />
  <rect class="card" x="914" y="712" width="355" height="330" />
  <rect class="thumb" x="190" y="732" width="120" height="120" />
  <rect class="thumb" x="562" y="732" width="120" height="120" />
  <rect class="thumb" x="934" y="732" width="120" height="120" />
  <text x="325" y="760" class="tiny">氏名 / 役職</text>
  <text x="697" y="760" class="tiny">氏名 / 役職</text>
  <text x="1069" y="760" class="tiny">氏名 / 役職</text>
  <text x="325" y="790" class="tiny">指導スタイル要約</text>
  <text x="697" y="790" class="tiny">指導スタイル要約</text>
  <text x="1069" y="790" class="tiny">指導スタイル要約</text>
  <rect class="chip" x="325" y="818" width="90" height="24" rx="12" />
  <rect class="chip" x="697" y="818" width="90" height="24" rx="12" />
  <rect class="chip" x="1069" y="818" width="90" height="24" rx="12" />
  <text x="338" y="835" class="tiny">初心者</text>
  <text x="710" y="835" class="tiny">資格</text>
  <text x="1082" y="835" class="tiny">こども</text>

  <!-- QA / FAQ snippet -->
  <rect class="sec" x="140" y="1090" width="1160" height="250" />
  <text x="165" y="1132" class="label">5. 師範選択FAQ</text>
  <rect class="card" x="170" y="1162" width="1100" height="56" />
  <rect class="card" x="170" y="1228" width="1100" height="56" />
  <text x="190" y="1196" class="tiny">Q. 初心者の担当師範はどう決まりますか？</text>
  <text x="190" y="1262" class="tiny">Q. 受講開始後に師範を選べますか？</text>

  <!-- お問い合わせ Strip -->
  <rect class="sec" x="140" y="1360" width="1160" height="160" />
  <text x="165" y="1402" class="label">6. お問い合わせ導線</text>
  <rect class="card" x="170" y="1422" width="1100" height="78" />
  <text x="190" y="1468" class="tiny">受講相談：フォーム / 電話</text>

  <!-- Footer -->
  <rect class="sec" x="140" y="1540" width="1160" height="170" />
  <text x="165" y="1582" class="label">7. フッター</text>
  <line class="line" x1="170" y1="1600" x2="1270" y2="1600" />
  <text x="170" y="1642" class="tiny">お問い合わせ | 電話 | プライバシーポリシー | サイトマップ</text>

  <!-- 備考 -->
  <rect class="card" x="140" y="1730" width="1160" height="470" />
  <text x="165" y="1770" class="label">レイアウト注記</text>
  <text x="165" y="1802" class="tiny">- 主目的：師範との相性不安を減らす</text>
  <text x="165" y="1830" class="tiny">- 各カードに指導スタイルと対象を明記する</text>
  <text x="165" y="1858" class="tiny">- 3名体制のため1段構成で可読性を確保する</text>
  <text x="165" y="1886" class="tiny">- トップ / 塾についてページと視覚リズムを統一</text>
</svg>






<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2720" viewBox="0 0 1440 2720">
  <defs>
    <style>
      .bg { fill: #f5f5f5; }
      .frame { fill: #ffffff; stroke: #222; stroke-width: 2; }
      .sec { fill: #fafafa; stroke: #555; stroke-width: 1.5; }
      .label { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 22px; fill: #111; font-weight: 700; }
      .sub { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 16px; fill: #444; }
      .tiny { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 14px; fill: #666; }
      .card { fill: #fff; stroke: #777; stroke-width: 1.2; }
      .thumb { fill: #f0f0f0; stroke: #999; stroke-dasharray: 6 4; }
      .line { stroke: #999; stroke-width: 1.2; }
      .chip { fill: #f1f1f1; stroke: #999; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="2720" />
  <rect class="frame" x="120" y="40" width="1200" height="2640" rx="8" />

  <text x="140" y="28" class="sub">Sub Page Wireframe (PC) - Masters Page</text>

  <!-- Header -->
  <rect class="sec" x="140" y="70" width="1160" height="90" />
  <text x="165" y="124" class="label">1. Header (Logo / Global Navigation)</text>
  <rect class="card" x="165" y="92" width="170" height="46" rx="4" />
  <text x="183" y="121" class="sub">LOGO</text>
  <rect class="card" x="470" y="92" width="800" height="46" rx="4" />
  <text x="490" y="121" class="sub">NAV: Home | About | Masters | Courses | Portfolio | FAQ | Access | Contact</text>

  <!-- Hero -->
  <rect class="sec" x="140" y="180" width="1160" height="250" />
  <text x="165" y="222" class="label">2. Page Hero (Masters)</text>
  <rect class="thumb" x="170" y="248" width="1100" height="150" />
  <text x="720" y="328" class="sub" text-anchor="middle">Head Instructors and Teaching Styles</text>

  <!-- Filter / Intro -->
  <rect class="sec" x="140" y="450" width="1160" height="170" />
  <text x="165" y="492" class="label">3. Intro + Filter Chips</text>
  <rect class="card" x="170" y="512" width="1100" height="78" />
  <text x="190" y="542" class="tiny">Short intro: learn from experienced instructors with beginner-friendly guidance.</text>
  <rect class="chip" x="190" y="553" width="120" height="28" rx="14" />
  <rect class="chip" x="320" y="553" width="120" height="28" rx="14" />
  <rect class="chip" x="450" y="553" width="120" height="28" rx="14" />
  <rect class="chip" x="580" y="553" width="140" height="28" rx="14" />
  <text x="220" y="572" class="tiny">Beginner</text>
  <text x="350" y="572" class="tiny">Certification</text>
  <text x="480" y="572" class="tiny">Kids</text>
  <text x="617" y="572" class="tiny">Adults</text>

  <!-- Masters Grid Row 1 -->
  <rect class="sec" x="140" y="640" width="1160" height="430" />
  <text x="165" y="682" class="label">4. Masters Cards (Row 1)</text>
  <rect class="card" x="170" y="712" width="355" height="330" />
  <rect class="card" x="542" y="712" width="355" height="330" />
  <rect class="card" x="914" y="712" width="355" height="330" />
  <rect class="thumb" x="190" y="732" width="120" height="120" />
  <rect class="thumb" x="562" y="732" width="120" height="120" />
  <rect class="thumb" x="934" y="732" width="120" height="120" />
  <text x="325" y="760" class="tiny">Name / Title</text>
  <text x="697" y="760" class="tiny">Name / Title</text>
  <text x="1069" y="760" class="tiny">Name / Title</text>
  <text x="325" y="790" class="tiny">Teaching style summary</text>
  <text x="697" y="790" class="tiny">Teaching style summary</text>
  <text x="1069" y="790" class="tiny">Teaching style summary</text>
  <rect class="chip" x="325" y="818" width="90" height="24" rx="12" />
  <rect class="chip" x="697" y="818" width="90" height="24" rx="12" />
  <rect class="chip" x="1069" y="818" width="90" height="24" rx="12" />
  <text x="338" y="835" class="tiny">Beginner</text>
  <text x="710" y="835" class="tiny">Cert.</text>
  <text x="1082" y="835" class="tiny">Kids</text>

  <!-- Masters Grid Row 2 -->
  <rect class="sec" x="140" y="1090" width="1160" height="430" />
  <text x="165" y="1132" class="label">5. Masters Cards (Row 2)</text>
  <rect class="card" x="170" y="1162" width="355" height="330" />
  <rect class="card" x="542" y="1162" width="355" height="330" />
  <rect class="card" x="914" y="1162" width="355" height="330" />
  <rect class="thumb" x="190" y="1182" width="120" height="120" />
  <rect class="thumb" x="562" y="1182" width="120" height="120" />
  <rect class="thumb" x="934" y="1182" width="120" height="120" />
  <text x="325" y="1210" class="tiny">Name / Title</text>
  <text x="697" y="1210" class="tiny">Name / Title</text>
  <text x="1069" y="1210" class="tiny">Name / Title</text>

  <!-- QA / FAQ snippet -->
  <rect class="sec" x="140" y="1540" width="1160" height="250" />
  <text x="165" y="1582" class="label">6. Instructor Selection FAQ</text>
  <rect class="card" x="170" y="1612" width="1100" height="56" />
  <rect class="card" x="170" y="1678" width="1100" height="56" />
  <text x="190" y="1646" class="tiny">Q. How are instructors assigned for beginners?</text>
  <text x="190" y="1712" class="tiny">Q. Can students choose an instructor after trial?</text>

  <!-- Contact Strip -->
  <rect class="sec" x="140" y="1810" width="1160" height="160" />
  <text x="165" y="1852" class="label">7. Contact Strip</text>
  <rect class="card" x="170" y="1872" width="1100" height="78" />
  <text x="190" y="1918" class="tiny">For class inquiries: contact form / phone</text>

  <!-- Footer -->
  <rect class="sec" x="140" y="1990" width="1160" height="170" />
  <text x="165" y="2032" class="label">8. Footer</text>
  <line class="line" x1="170" y1="2050" x2="1270" y2="2050" />
  <text x="170" y="2092" class="tiny">Contact | Phone | Privacy Policy | Sitemap</text>

  <!-- Notes -->
  <rect class="card" x="140" y="2180" width="1160" height="470" />
  <text x="165" y="2220" class="label">Layout Notes</text>
  <text x="165" y="2252" class="tiny">- Primary intent: reduce uncertainty about instructor fit.</text>
  <text x="165" y="2280" class="tiny">- Put teaching style and target audience directly on each card.</text>
  <text x="165" y="2308" class="tiny">- Use two rows to avoid over-compressed cards and keep readability.</text>
  <text x="165" y="2336" class="tiny">- Keep visual rhythm consistent with top/about pages.</text>
</svg>

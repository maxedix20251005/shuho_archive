<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2860" viewBox="0 0 1440 2860">
  <defs>
    <style>
      .bg { fill: #f5f5f5; }
      .frame { fill: #ffffff; stroke: #222; stroke-width: 2; }
      .sec { fill: #fafafa; stroke: #555; stroke-width: 1.5; }
      .label { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 22px; fill: #111; font-weight: 700; }
      .sub { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 16px; fill: #444; }
      .tiny { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 14px; fill: #666; }
      .card { fill: #fff; stroke: #777; stroke-width: 1.2; }
      .line { stroke: #999; stroke-width: 1.2; }
      .chip { fill: #f1f1f1; stroke: #999; stroke-width: 1; }
      .field { fill: #fcfcfc; stroke: #aaa; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="2860" />
  <rect class="frame" x="120" y="40" width="1200" height="2780" rx="8" />

  <text x="140" y="28" class="sub">管理画面ワイヤーフレーム（PC）- お知らせ管理</text>

  <rect class="sec" x="140" y="70" width="1160" height="90" />
  <text x="165" y="124" class="label">1. 管理ヘッダー（ロゴ / ユーザー / ログアウト）</text>
  <rect class="card" x="165" y="92" width="170" height="46" rx="4" />
  <text x="183" y="121" class="sub">管理ロゴ</text>
  <rect class="card" x="980" y="92" width="290" height="46" rx="4" />
  <text x="1000" y="121" class="sub">管理ユーザー | ログアウト</text>

  <rect class="sec" x="140" y="180" width="1160" height="110" />
  <text x="165" y="222" class="label">2. 管理ナビゲーション</text>
  <rect class="chip" x="170" y="240" width="200" height="34" rx="17" />
  <rect class="chip" x="380" y="240" width="220" height="34" rx="17" />
  <rect class="chip" x="610" y="240" width="220" height="34" rx="17" />
  <rect class="chip" x="840" y="240" width="220" height="34" rx="17" />
  <text x="270" y="262" class="tiny" text-anchor="middle">ダッシュボード</text>
  <text x="490" y="262" class="tiny" text-anchor="middle">作品管理</text>
  <text x="720" y="262" class="tiny" text-anchor="middle">問い合わせ管理</text>
  <text x="950" y="262" class="tiny" text-anchor="middle">お知らせ管理（表示中）</text>

  <rect class="sec" x="140" y="310" width="1160" height="140" />
  <text x="165" y="352" class="label">3. お知らせ管理</text>
  <rect class="card" x="170" y="372" width="700" height="56" />
  <text x="190" y="406" class="tiny">タイトル / 公開状態 / 掲載日で検索</text>
  <rect class="card" x="890" y="372" width="180" height="56" rx="6" />
  <rect class="card" x="1090" y="372" width="180" height="56" rx="6" />
  <text x="980" y="406" class="tiny" text-anchor="middle">絞り込み</text>
  <text x="1180" y="406" class="tiny" text-anchor="middle">新規お知らせ</text>

  <rect class="sec" x="140" y="470" width="1160" height="520" />
  <text x="165" y="512" class="label">4. お知らせ一覧テーブル</text>
  <rect class="card" x="170" y="542" width="1100" height="420" />
  <line class="line" x1="170" y1="592" x2="1270" y2="592" />
  <line class="line" x1="170" y1="652" x2="1270" y2="652" />
  <line class="line" x1="170" y1="712" x2="1270" y2="712" />
  <line class="line" x1="170" y1="772" x2="1270" y2="772" />
  <line class="line" x1="170" y1="832" x2="1270" y2="832" />
  <text x="190" y="574" class="tiny">掲載日</text>
  <text x="310" y="574" class="tiny">タイトル</text>
  <text x="850" y="574" class="tiny">公開状態</text>
  <text x="980" y="574" class="tiny">更新日</text>
  <text x="1120" y="574" class="tiny">操作</text>

  <rect class="sec" x="140" y="1010" width="1160" height="120" />
  <text x="165" y="1052" class="label">5. ページネーション</text>
  <rect class="chip" x="520" y="1070" width="60" height="34" rx="17" />
  <rect class="chip" x="590" y="1070" width="60" height="34" rx="17" />
  <rect class="chip" x="660" y="1070" width="60" height="34" rx="17" />
  <rect class="chip" x="730" y="1070" width="60" height="34" rx="17" />
  <text x="550" y="1092" class="tiny" text-anchor="middle">1</text>
  <text x="620" y="1092" class="tiny" text-anchor="middle">2</text>
  <text x="690" y="1092" class="tiny" text-anchor="middle">3</text>
  <text x="760" y="1092" class="tiny" text-anchor="middle">次へ</text>

  <rect class="sec" x="140" y="1150" width="1160" height="780" />
  <text x="165" y="1192" class="label">6. お知らせエディタ（新規 / 編集）</text>
  <rect class="card" x="170" y="1222" width="1100" height="680" />
  <text x="190" y="1270" class="tiny">タイトル *</text>
  <rect class="field" x="190" y="1282" width="1060" height="44" rx="4" />
  <text x="190" y="1350" class="tiny">本文 *</text>
  <rect class="field" x="190" y="1362" width="1060" height="260" rx="4" />
  <text x="190" y="1650" class="tiny">掲載日 *</text>
  <rect class="field" x="190" y="1662" width="350" height="44" rx="4" />
  <text x="580" y="1650" class="tiny">公開状態 *</text>
  <rect class="field" x="580" y="1662" width="300" height="44" rx="4" />
  <rect class="chip" x="190" y="1740" width="18" height="18" rx="3" />
  <text x="218" y="1755" class="tiny">トップに固定表示</text>
  <rect class="card" x="880" y="1822" width="170" height="44" rx="6" />
  <rect class="card" x="1080" y="1822" width="170" height="44" rx="6" />
  <text x="965" y="1850" class="tiny" text-anchor="middle">下書き保存</text>
  <text x="1165" y="1850" class="tiny" text-anchor="middle">公開</text>

  <rect class="sec" x="140" y="1950" width="1160" height="300" />
  <text x="165" y="1992" class="label">7. 運用メモ</text>
  <rect class="card" x="170" y="2022" width="1100" height="200" />
  <text x="190" y="2060" class="tiny">- 公開状態：draft / published</text>
  <text x="190" y="2088" class="tiny">- 掲載日は公開側表示と同一フォーマットで管理する</text>
  <text x="190" y="2116" class="tiny">- 作品管理 / 問い合わせ管理と共通UIで運用する</text>

  <rect class="sec" x="140" y="2270" width="1160" height="170" />
  <text x="165" y="2312" class="label">8. 管理フッター</text>
  <line class="line" x1="170" y1="2330" x2="1270" y2="2330" />
  <text x="170" y="2372" class="tiny">管理ヘルプ | ログ | プライバシー | バージョン</text>

  <rect class="card" x="140" y="2460" width="1160" height="340" />
  <text x="165" y="2500" class="label">レイアウト注記</text>
  <text x="165" y="2532" class="tiny">- お知らせ一覧とエディタを同一画面に置き、更新を高速化</text>
  <text x="165" y="2560" class="tiny">- 公開状態と掲載日を必須化し、公開側表示品質を担保</text>
  <text x="165" y="2588" class="tiny">- 3管理画面（作品 / 問い合わせ / お知らせ）で同一操作体系を維持</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2740" viewBox="0 0 1440 2740">
  <defs>
    <style>
      .bg { fill: #f5f5f5; }
      .frame { fill: #ffffff; stroke: #222; stroke-width: 2; }
      .sec { fill: #fafafa; stroke: #555; stroke-width: 1.5; }
      .label { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 22px; fill: #111; font-weight: 700; }
      .sub { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 16px; fill: #444; }
      .tiny { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 14px; fill: #666; }
      .card { fill: #fff; stroke: #777; stroke-width: 1.2; }
      .thumb { fill: #f0f0f0; stroke: #999; stroke-dasharray: 6 4; }
      .line { stroke: #999; stroke-width: 1.2; }
      .chip { fill: #f1f1f1; stroke: #999; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="2740" />
  <rect class="frame" x="120" y="40" width="1200" height="2660" rx="8" />

  <text x="140" y="28" class="sub">Sub Page Wireframe (PC) - Access Page</text>

  <!-- Header -->
  <rect class="sec" x="140" y="70" width="1160" height="90" />
  <text x="165" y="124" class="label">1. Header (Logo / Global Navigation)</text>
  <rect class="card" x="165" y="92" width="170" height="46" rx="4" />
  <text x="183" y="121" class="sub">LOGO</text>
  <rect class="card" x="470" y="92" width="800" height="46" rx="4" />
  <text x="490" y="121" class="sub">NAV: Home | About | Masters | Courses | Portfolio | FAQ | Access | Contact</text>

  <!-- Hero -->
  <rect class="sec" x="140" y="180" width="1160" height="220" />
  <text x="165" y="222" class="label">2. Page Hero (Access)</text>
  <rect class="thumb" x="170" y="248" width="1100" height="120" />
  <text x="720" y="314" class="sub" text-anchor="middle">How to reach the school smoothly</text>

  <!-- Main Access Block -->
  <rect class="sec" x="140" y="420" width="1160" height="470" />
  <text x="165" y="462" class="label">3. Map and Basic Info</text>
  <rect class="thumb" x="170" y="492" width="640" height="370" />
  <text x="490" y="688" class="sub" text-anchor="middle">Map Area</text>
  <rect class="card" x="840" y="492" width="430" height="370" />
  <text x="860" y="530" class="sub">Address / Station / Contact</text>
  <text x="860" y="560" class="tiny">Address: Shinagawa, Tokyo</text>
  <text x="860" y="588" class="tiny">Nearest station: XX station, 5 min walk</text>
  <text x="860" y="616" class="tiny">Open hours: Weekday evenings / Saturday</text>
  <text x="860" y="644" class="tiny">Phone / Contact form guidance</text>

  <!-- Route Guides -->
  <rect class="sec" x="140" y="910" width="1160" height="360" />
  <text x="165" y="952" class="label">4. Route Guide by Station Exit</text>
  <rect class="card" x="170" y="982" width="355" height="260" />
  <rect class="card" x="542" y="982" width="355" height="260" />
  <rect class="card" x="914" y="982" width="355" height="260" />
  <rect class="thumb" x="190" y="1002" width="315" height="120" />
  <rect class="thumb" x="562" y="1002" width="315" height="120" />
  <rect class="thumb" x="934" y="1002" width="315" height="120" />
  <text x="347" y="1160" class="tiny" text-anchor="middle">Exit A Route</text>
  <text x="719" y="1160" class="tiny" text-anchor="middle">Exit B Route</text>
  <text x="1091" y="1160" class="tiny" text-anchor="middle">Landmark Route</text>

  <!-- Exterior Photos -->
  <rect class="sec" x="140" y="1290" width="1160" height="300" />
  <text x="165" y="1332" class="label">5. Exterior and Entrance Photos</text>
  <rect class="thumb" x="170" y="1362" width="355" height="200" />
  <rect class="thumb" x="542" y="1362" width="355" height="200" />
  <rect class="thumb" x="914" y="1362" width="355" height="200" />
  <text x="347" y="1574" class="tiny" text-anchor="middle">Building Exterior</text>
  <text x="719" y="1574" class="tiny" text-anchor="middle">Entrance Gate</text>
  <text x="1091" y="1574" class="tiny" text-anchor="middle">Neighborhood Landmark</text>

  <!-- Transport / Notes -->
  <rect class="sec" x="140" y="1610" width="1160" height="260" />
  <text x="165" y="1652" class="label">6. Transport and Visit Notes</text>
  <rect class="card" x="170" y="1682" width="1100" height="160" />
  <text x="190" y="1720" class="tiny">- Bicycle / car access policy</text>
  <text x="190" y="1748" class="tiny">- Waiting area for guardians</text>
  <text x="190" y="1776" class="tiny">- Recommended arrival timing before class</text>

  <!-- FAQ Snippet -->
  <rect class="sec" x="140" y="1890" width="1160" height="210" />
  <text x="165" y="1932" class="label">7. Access FAQ</text>
  <rect class="card" x="170" y="1962" width="1100" height="56" />
  <rect class="card" x="170" y="2028" width="1100" height="56" />
  <text x="190" y="1996" class="tiny">Q. Is there parking nearby?</text>
  <text x="190" y="2062" class="tiny">Q. Can guardians wait during class?</text>

  <!-- Contact Strip -->
  <rect class="sec" x="140" y="2120" width="1160" height="160" />
  <text x="165" y="2162" class="label">8. Contact Strip</text>
  <rect class="card" x="170" y="2182" width="1100" height="78" />
  <text x="190" y="2228" class="tiny">Need route support? Contact form / phone</text>

  <!-- Footer -->
  <rect class="sec" x="140" y="2300" width="1160" height="170" />
  <text x="165" y="2342" class="label">9. Footer</text>
  <line class="line" x1="170" y1="2360" x2="1270" y2="2360" />
  <text x="170" y="2402" class="tiny">Contact | Phone | Privacy Policy | Sitemap</text>

  <!-- Notes -->
  <rect class="card" x="140" y="2490" width="1160" height="200" />
  <text x="165" y="2530" class="label">Layout Notes</text>
  <text x="165" y="2562" class="tiny">- Prioritize map, station access, and visual landmarks above all.</text>
  <text x="165" y="2590" class="tiny">- Reduce arrival anxiety with route photos and practical notes.</text>
  <text x="165" y="2618" class="tiny">- Keep conversion pathway as contact support by current scope.</text>
</svg>

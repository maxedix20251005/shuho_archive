<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2860" viewBox="0 0 1440 2860">
  <defs>
    <style>
      .bg { fill: #f5f5f5; }
      .frame { fill: #ffffff; stroke: #222; stroke-width: 2; }
      .sec { fill: #fafafa; stroke: #555; stroke-width: 1.5; }
      .label { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 22px; fill: #111; font-weight: 700; }
      .sub { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 16px; fill: #444; }
      .tiny { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 14px; fill: #666; }
      .card { fill: #fff; stroke: #777; stroke-width: 1.2; }
      .line { stroke: #999; stroke-width: 1.2; }
      .chip { fill: #f1f1f1; stroke: #999; stroke-width: 1; }
      .field { fill: #fcfcfc; stroke: #aaa; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="2860" />
  <rect class="frame" x="120" y="40" width="1200" height="2780" rx="8" />

  <text x="140" y="28" class="sub">管理画面ワイヤーフレーム（PC）- 問い合わせ管理</text>

  <rect class="sec" x="140" y="70" width="1160" height="90" />
  <text x="165" y="124" class="label">1. 管理ヘッダー（ロゴ / ユーザー / ログアウト）</text>
  <rect class="card" x="165" y="92" width="170" height="46" rx="4" />
  <text x="183" y="121" class="sub">管理ロゴ</text>
  <rect class="card" x="980" y="92" width="290" height="46" rx="4" />
  <text x="1000" y="121" class="sub">管理ユーザー | ログアウト</text>

  <rect class="sec" x="140" y="180" width="1160" height="110" />
  <text x="165" y="222" class="label">2. 管理ナビゲーション</text>
  <rect class="chip" x="170" y="240" width="200" height="34" rx="17" />
  <rect class="chip" x="380" y="240" width="220" height="34" rx="17" />
  <rect class="chip" x="610" y="240" width="220" height="34" rx="17" />
  <rect class="chip" x="840" y="240" width="220" height="34" rx="17" />
  <text x="270" y="262" class="tiny" text-anchor="middle">ダッシュボード</text>
  <text x="490" y="262" class="tiny" text-anchor="middle">作品管理</text>
  <text x="720" y="262" class="tiny" text-anchor="middle">問い合わせ管理（表示中）</text>
  <text x="950" y="262" class="tiny" text-anchor="middle">お知らせ管理</text>

  <rect class="sec" x="140" y="310" width="1160" height="140" />
  <text x="165" y="352" class="label">3. 問い合わせ管理</text>
  <rect class="card" x="170" y="372" width="700" height="56" />
  <text x="190" y="406" class="tiny">氏名 / メール / 種別 / 状態で検索</text>
  <rect class="card" x="890" y="372" width="180" height="56" rx="6" />
  <rect class="card" x="1090" y="372" width="180" height="56" rx="6" />
  <text x="980" y="406" class="tiny" text-anchor="middle">絞り込み</text>
  <text x="1180" y="406" class="tiny" text-anchor="middle">CSV出力</text>

  <rect class="sec" x="140" y="470" width="1160" height="560" />
  <text x="165" y="512" class="label">4. 問い合わせ一覧テーブル</text>
  <rect class="card" x="170" y="542" width="1100" height="460" />
  <line class="line" x1="170" y1="592" x2="1270" y2="592" />
  <line class="line" x1="170" y1="652" x2="1270" y2="652" />
  <line class="line" x1="170" y1="712" x2="1270" y2="712" />
  <line class="line" x1="170" y1="772" x2="1270" y2="772" />
  <line class="line" x1="170" y1="832" x2="1270" y2="832" />
  <line class="line" x1="170" y1="892" x2="1270" y2="892" />
  <text x="190" y="574" class="tiny">受付日時</text>
  <text x="330" y="574" class="tiny">氏名</text>
  <text x="470" y="574" class="tiny">メール</text>
  <text x="700" y="574" class="tiny">種別</text>
  <text x="830" y="574" class="tiny">状態</text>
  <text x="940" y="574" class="tiny">担当</text>
  <text x="1090" y="574" class="tiny">操作</text>

  <rect class="sec" x="140" y="1050" width="1160" height="120" />
  <text x="165" y="1092" class="label">5. ページネーション</text>
  <rect class="chip" x="520" y="1110" width="60" height="34" rx="17" />
  <rect class="chip" x="590" y="1110" width="60" height="34" rx="17" />
  <rect class="chip" x="660" y="1110" width="60" height="34" rx="17" />
  <rect class="chip" x="730" y="1110" width="60" height="34" rx="17" />
  <text x="550" y="1132" class="tiny" text-anchor="middle">1</text>
  <text x="620" y="1132" class="tiny" text-anchor="middle">2</text>
  <text x="690" y="1132" class="tiny" text-anchor="middle">3</text>
  <text x="760" y="1132" class="tiny" text-anchor="middle">次へ</text>

  <rect class="sec" x="140" y="1190" width="1160" height="760" />
  <text x="165" y="1232" class="label">6. 問い合わせ詳細 / ステータス更新</text>
  <rect class="card" x="170" y="1262" width="1100" height="660" />
  <text x="190" y="1310" class="tiny">氏名・メール・電話・種別・本文を表示</text>
  <rect class="field" x="190" y="1324" width="1060" height="170" rx="4" />
  <text x="190" y="1540" class="tiny">管理メモ</text>
  <rect class="field" x="190" y="1552" width="1060" height="180" rx="4" />
  <text x="190" y="1770" class="tiny">対応状態</text>
  <rect class="field" x="190" y="1782" width="350" height="44" rx="4" />
  <rect class="card" x="880" y="1840" width="170" height="44" rx="6" />
  <rect class="card" x="1080" y="1840" width="170" height="44" rx="6" />
  <text x="965" y="1868" class="tiny" text-anchor="middle">下書き保存</text>
  <text x="1165" y="1868" class="tiny" text-anchor="middle">更新</text>

  <rect class="sec" x="140" y="1970" width="1160" height="300" />
  <text x="165" y="2012" class="label">7. 運用メモ</text>
  <rect class="card" x="170" y="2042" width="1100" height="200" />
  <text x="190" y="2080" class="tiny">- 状態運用：new / processing / closed / spam</text>
  <text x="190" y="2108" class="tiny">- 個人情報を含むため、管理者権限のみ閲覧可能とする</text>
  <text x="190" y="2136" class="tiny">- 監査ログに更新者と更新日時を記録する</text>

  <rect class="sec" x="140" y="2290" width="1160" height="170" />
  <text x="165" y="2332" class="label">8. 管理フッター</text>
  <line class="line" x1="170" y1="2350" x2="1270" y2="2350" />
  <text x="170" y="2392" class="tiny">管理ヘルプ | ログ | プライバシー | バージョン</text>

  <rect class="card" x="140" y="2480" width="1160" height="320" />
  <text x="165" y="2520" class="label">レイアウト注記</text>
  <text x="165" y="2552" class="tiny">- 問い合わせは最優先対応のため一覧と詳細を同画面導線で設計</text>
  <text x="165" y="2580" class="tiny">- ステータス変更と管理メモ更新を最短導線で実行できる構成</text>
  <text x="165" y="2608" class="tiny">- 作品管理 / お知らせ管理と同一UI構造で運用負荷を下げる</text>
</svg>

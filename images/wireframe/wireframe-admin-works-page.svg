<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2860" viewBox="0 0 1440 2860">
  <defs>
    <style>
      .bg { fill: #f5f5f5; }
      .frame { fill: #ffffff; stroke: #222; stroke-width: 2; }
      .sec { fill: #fafafa; stroke: #555; stroke-width: 1.5; }
      .label { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 22px; fill: #111; font-weight: 700; }
      .sub { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 16px; fill: #444; }
      .tiny { font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 14px; fill: #666; }
      .card { fill: #fff; stroke: #777; stroke-width: 1.2; }
      .thumb { fill: #f0f0f0; stroke: #999; stroke-dasharray: 6 4; }
      .line { stroke: #999; stroke-width: 1.2; }
      .chip { fill: #f1f1f1; stroke: #999; stroke-width: 1; }
      .field { fill: #fcfcfc; stroke: #aaa; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="2860" />
  <rect class="frame" x="120" y="40" width="1200" height="2780" rx="8" />

  <text x="140" y="28" class="sub">Admin Wireframe (PC) - Works Management</text>

  <!-- Admin Header -->
  <rect class="sec" x="140" y="70" width="1160" height="90" />
  <text x="165" y="124" class="label">1. Admin Header (Logo / User / Logout)</text>
  <rect class="card" x="165" y="92" width="170" height="46" rx="4" />
  <text x="183" y="121" class="sub">ADMIN LOGO</text>
  <rect class="card" x="980" y="92" width="290" height="46" rx="4" />
  <text x="1000" y="121" class="sub">Admin User | Logout</text>

  <!-- Admin Navigation -->
  <rect class="sec" x="140" y="180" width="1160" height="110" />
  <text x="165" y="222" class="label">2. Admin Navigation</text>
  <rect class="chip" x="170" y="240" width="220" height="34" rx="17" />
  <rect class="chip" x="400" y="240" width="220" height="34" rx="17" />
  <rect class="chip" x="630" y="240" width="220" height="34" rx="17" />
  <text x="280" y="262" class="tiny" text-anchor="middle">Dashboard</text>
  <text x="510" y="262" class="tiny" text-anchor="middle">Works (Active)</text>
  <text x="740" y="262" class="tiny" text-anchor="middle">Settings</text>

  <!-- Page Title / Actions -->
  <rect class="sec" x="140" y="310" width="1160" height="140" />
  <text x="165" y="352" class="label">3. Works Management</text>
  <rect class="card" x="170" y="372" width="700" height="56" />
  <text x="190" y="406" class="tiny">Search by title / category / status</text>
  <rect class="card" x="890" y="372" width="180" height="56" rx="6" />
  <rect class="card" x="1090" y="372" width="180" height="56" rx="6" />
  <text x="980" y="406" class="tiny" text-anchor="middle">Filter</text>
  <text x="1180" y="406" class="tiny" text-anchor="middle">New Work</text>

  <!-- Works Table -->
  <rect class="sec" x="140" y="470" width="1160" height="560" />
  <text x="165" y="512" class="label">4. Works Table</text>
  <rect class="card" x="170" y="542" width="1100" height="460" />
  <line class="line" x1="170" y1="592" x2="1270" y2="592" />
  <line class="line" x1="170" y1="652" x2="1270" y2="652" />
  <line class="line" x1="170" y1="712" x2="1270" y2="712" />
  <line class="line" x1="170" y1="772" x2="1270" y2="772" />
  <line class="line" x1="170" y1="832" x2="1270" y2="832" />
  <line class="line" x1="170" y1="892" x2="1270" y2="892" />
  <text x="190" y="574" class="tiny">Thumbnail</text>
  <text x="360" y="574" class="tiny">Title</text>
  <text x="620" y="574" class="tiny">Category</text>
  <text x="760" y="574" class="tiny">Level</text>
  <text x="880" y="574" class="tiny">Status</text>
  <text x="1010" y="574" class="tiny">Updated</text>
  <text x="1130" y="574" class="tiny">Actions</text>

  <!-- Pagination -->
  <rect class="sec" x="140" y="1050" width="1160" height="120" />
  <text x="165" y="1092" class="label">5. Pagination</text>
  <rect class="chip" x="520" y="1110" width="60" height="34" rx="17" />
  <rect class="chip" x="590" y="1110" width="60" height="34" rx="17" />
  <rect class="chip" x="660" y="1110" width="60" height="34" rx="17" />
  <rect class="chip" x="730" y="1110" width="60" height="34" rx="17" />
  <text x="550" y="1132" class="tiny" text-anchor="middle">1</text>
  <text x="620" y="1132" class="tiny" text-anchor="middle">2</text>
  <text x="690" y="1132" class="tiny" text-anchor="middle">3</text>
  <text x="760" y="1132" class="tiny" text-anchor="middle">Next</text>

  <!-- Editor Panel -->
  <rect class="sec" x="140" y="1190" width="1160" height="820" />
  <text x="165" y="1232" class="label">6. Work Editor (Create / Edit)</text>
  <rect class="card" x="170" y="1262" width="1100" height="720" />

  <text x="190" y="1310" class="tiny">Title *</text>
  <rect class="field" x="190" y="1322" width="1060" height="44" rx="4" />

  <text x="190" y="1390" class="tiny">Category *</text>
  <rect class="field" x="190" y="1402" width="510" height="44" rx="4" />
  <text x="740" y="1390" class="tiny">Level *</text>
  <rect class="field" x="740" y="1402" width="510" height="44" rx="4" />

  <text x="190" y="1470" class="tiny">Description</text>
  <rect class="field" x="190" y="1482" width="1060" height="160" rx="4" />

  <text x="190" y="1660" class="tiny">Upload Image *</text>
  <rect class="thumb" x="190" y="1672" width="330" height="220" />
  <rect class="card" x="540" y="1672" width="710" height="220" />
  <text x="560" y="1710" class="tiny">Upload controls / crop / alt text / preview</text>

  <rect class="chip" x="190" y="1910" width="18" height="18" rx="3" />
  <text x="218" y="1925" class="tiny">Publish now</text>
  <rect class="card" x="880" y="1902" width="170" height="44" rx="6" />
  <rect class="card" x="1080" y="1902" width="170" height="44" rx="6" />
  <text x="965" y="1930" class="tiny" text-anchor="middle">Save Draft</text>
  <text x="1165" y="1930" class="tiny" text-anchor="middle">Publish</text>

  <!-- Notes -->
  <rect class="sec" x="140" y="2030" width="1160" height="300" />
  <text x="165" y="2072" class="label">7. Operational Notes</text>
  <rect class="card" x="170" y="2102" width="1100" height="200" />
  <text x="190" y="2140" class="tiny">- Use status workflow: draft / review / published.</text>
  <text x="190" y="2168" class="tiny">- Track who updated each record and when.</text>
  <text x="190" y="2196" class="tiny">- Keep thumbnail and metadata consistency for public portfolio pages.</text>

  <!-- Footer -->
  <rect class="sec" x="140" y="2350" width="1160" height="170" />
  <text x="165" y="2392" class="label">8. Admin Footer</text>
  <line class="line" x1="170" y1="2410" x2="1270" y2="2410" />
  <text x="170" y="2452" class="tiny">Admin Help | Logs | Privacy | Version</text>

  <!-- Final Notes -->
  <rect class="card" x="140" y="2540" width="1160" height="260" />
  <text x="165" y="2580" class="label">Layout Notes</text>
  <text x="165" y="2612" class="tiny">- This is the only admin page in current scope.</text>
  <text x="165" y="2640" class="tiny">- Prioritize fast content updates and safe publish flow.</text>
  <text x="165" y="2668" class="tiny">- Keep structure ready for future expansion if admin scope grows.</text>
</svg>

<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品ポートフォリオ | 秀峰書道サロン</title>
  <meta name="description" content="秀峰書道サロンの作品ポートフォリオ。師範・一般・こどものカテゴリで閲覧できます。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="秀峰書道サロン">
  <meta property="og:locale" content="ja_JP">
  <meta property="og:title" content="作品ポートフォリオ | 秀峰書道サロン">
  <meta property="og:description" content="秀峰書道サロンの作品ポートフォリオ。師範・一般・こどものカテゴリで閲覧できます。">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="作品ポートフォリオ | 秀峰書道サロン">
  <meta name="twitter:description" content="秀峰書道サロンの作品ポートフォリオ。師範・一般・こどものカテゴリで閲覧できます。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/site.css">
  <link rel="shortcut icon" href="./assets/images/logo/favicon-shuho.png" type="image/png">
</head>

<body data-page="portfolio">
  <header id="site-header"></header>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="hero-kicker">Portfolio</p>
        <h1>作品ポートフォリオ</h1>
        <p>師範・一般・こどもの作品をカテゴリ別にご覧いただけます。</p>
      </div>
    </section>

    <section class="section section-paper">
      <div class="container">
        <div class="section-head">
          <h2>カテゴリ絞り込み</h2>
          <p id="portfolio-count" class="count-text" aria-live="polite">表示件数: 8件</p>
        </div>

        <div class="chips filter-chips" aria-label="作品カテゴリ">
          <button class="chip-btn is-active" type="button" data-filter="all">すべて</button>
          <button class="chip-btn" type="button" data-filter="master1">師範1</button>
          <button class="chip-btn" type="button" data-filter="master2">師範2</button>
          <button class="chip-btn" type="button" data-filter="master3">師範3</button>
          <button class="chip-btn" type="button" data-filter="general">一般</button>
          <button class="chip-btn" type="button" data-filter="kids">こども</button>
        </div>

        <div class="portfolio-grid" id="portfolio-grid">
          <article class="portfolio-card" data-category="master1">
            <div class="work-thumb" role="img" aria-label="師範1の作品サンプル"></div>
            <h3>行書 臨書作品</h3>
            <p>カテゴリ: 師範1</p>
          </article>
          <article class="portfolio-card" data-category="master2">
            <div class="work-thumb" role="img" aria-label="師範2の作品サンプル"></div>
            <h3>実用書サンプル</h3>
            <p>カテゴリ: 師範2</p>
          </article>
          <article class="portfolio-card" data-category="master3">
            <div class="work-thumb" role="img" aria-label="師範3の作品サンプル"></div>
            <h3>検定課題手本</h3>
            <p>カテゴリ: 師範3</p>
          </article>
          <article class="portfolio-card" data-category="general">
            <div class="work-thumb" role="img" aria-label="一般受講生の作品サンプル"></div>
            <h3>一般 実用書</h3>
            <p>カテゴリ: 一般</p>
          </article>
          <article class="portfolio-card" data-category="kids">
            <div class="work-thumb" role="img" aria-label="こども受講生の作品サンプル"></div>
            <h3>こども 硬筆作品</h3>
            <p>カテゴリ: こども</p>
          </article>
          <article class="portfolio-card" data-category="general">
            <div class="work-thumb" role="img" aria-label="一般受講生の作品サンプル"></div>
            <h3>一般 毛筆作品</h3>
            <p>カテゴリ: 一般</p>
          </article>
          <article class="portfolio-card" data-category="kids">
            <div class="work-thumb" role="img" aria-label="こども受講生の作品サンプル"></div>
            <h3>こども 毛筆作品</h3>
            <p>カテゴリ: こども</p>
          </article>
          <article class="portfolio-card" data-category="master1">
            <div class="work-thumb" role="img" aria-label="師範1の作品サンプル"></div>
            <h3>古典臨書</h3>
            <p>カテゴリ: 師範1</p>
          </article>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container cta-panel">
        <h2>目的に合うコースをご案内します</h2>
        <p>作品の傾向や学習目標に合わせて、最適な受講プランをご提案します。</p>
        <a class="btn-primary" href="./contact.html">お問い合わせへ進む</a>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <div id="sp-fixed-cta"></div>

  <script defer src="./assets/js/layout.js"></script>
  <script defer src="./assets/js/site.js"></script>
</body>

</html>

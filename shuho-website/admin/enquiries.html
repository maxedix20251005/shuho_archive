<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面: 問い合わせ管理 | 秀峰書道サロン</title>
  <link rel="stylesheet" href="../assets/css/site.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-side">
      <h1>秀峰管理</h1>
      <nav class="admin-nav" aria-label="Admin Navigation">
        <a href="./works.html">作品管理</a>
        <a class="is-active" href="./enquiries.html">問い合わせ管理</a>
        <a href="./news.html">お知らせ管理</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h2>問い合わせ管理</h2>
      </header>

      <section class="admin-panel">
        <div class="admin-filters">
          <input type="search" placeholder="氏名・メールで検索">
          <select>
            <option>状態: すべて</option>
            <option>new</option><option>processing</option><option>closed</option><option>spam</option>
          </select>
          <select>
            <option>種別: すべて</option>
            <option>course</option><option>fee</option><option>attendance</option><option>other</option>
          </select>
        </div>

        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr><th>ID</th><th>受付日時</th><th>氏名</th><th>種別</th><th>状態</th><th>操作</th></tr>
            </thead>
            <tbody>
              <tr>
                <td>E-001</td><td>2026.04.07 10:12</td><td>田中 美咲</td><td>course</td>
                <td><select class="status-select"><option selected>new</option><option>processing</option><option>closed</option><option>spam</option></select></td>
                <td><button class="btn-mini">詳細</button></td>
              </tr>
              <tr>
                <td>E-002</td><td>2026.04.06 19:20</td><td>鈴木 恒一</td><td>fee</td>
                <td><select class="status-select"><option>new</option><option selected>processing</option><option>closed</option><option>spam</option></select></td>
                <td><button class="btn-mini">詳細</button></td>
              </tr>
              <tr>
                <td>E-003</td><td>2026.04.05 09:08</td><td>佐々木 和子</td><td>attendance</td>
                <td><select class="status-select"><option>new</option><option>processing</option><option selected>closed</option><option>spam</option></select></td>
                <td><button class="btn-mini">詳細</button></td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="../assets/js/admin.js"></script>
</body>
</html>

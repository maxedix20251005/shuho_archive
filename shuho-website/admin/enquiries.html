<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面: 問い合わせ管理 | 秀峰書道サロン</title>
  <link rel="stylesheet" href="../assets/css/site.css">
  <link rel="shortcut icon" href="../assets/images/logo/favicon-shuho.png" type="image/png">
</head>

<body class="admin-body" data-admin-page="enquiries">
  <div class="admin-layout">
    <aside class="admin-side">
      <h1>秀峰管理</h1>
      <nav class="admin-nav" aria-label="Admin Navigation">
        <a href="./works.html">作品管理</a>
        <a class="is-active" href="./enquiries.html">問い合わせ管理</a>
        <a href="./news.html">お知らせ管理</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h2>問い合わせ管理</h2>
      </header>

      <section class="admin-panel">
        <div class="admin-filters">
          <input id="enquiry-search" type="search" placeholder="氏名・メールで検索">
          <select id="enquiry-status-filter">
            <option value="">状態: すべて</option>
            <option value="new">new</option>
            <option value="processing">processing</option>
            <option value="closed">closed</option>
            <option value="spam">spam</option>
          </select>
          <select id="enquiry-type-filter">
            <option value="">種別: すべて</option>
            <option value="course">course</option>
            <option value="fee">fee</option>
            <option value="attendance">attendance</option>
            <option value="other">other</option>
          </select>
          <button id="enquiry-filter-btn" class="btn-mini" type="button">検索</button>
        </div>

        <p id="admin-message" class="form-note" aria-live="polite"></p>

        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>受付日時</th>
                <th>氏名 / メール</th>
                <th>種別</th>
                <th>状態</th>
                <th>管理メモ</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="enquiry-tbody">
              <tr>
                <td colspan="7">読み込み中...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    window.__adminBooted = false;
    window.__adminBootError = '';
    function showAdminBootError(message) {
      var msg = document.querySelector('#admin-message');
      if (msg) {
        msg.textContent = message;
        msg.style.color = '#8c2a1e';
      }
      var tbody = document.querySelector('#works-tbody, #enquiry-tbody');
      if (tbody) {
        tbody.innerHTML = '<tr><td colspan="7">スクリプト読込に失敗しました。ブラウザのコンソールを確認してください。</td></tr>';
      }
    }
    setTimeout(function () {
      if (window.__adminBooted) return;
      var isFile = window.location.protocol === 'file:';
      var base = isFile
        ? '管理画面スクリプトを読み込めません。file:// では動作しません。http://localhost のローカルサーバーで開いてください。'
        : '管理画面スクリプトを読み込めません。`supabase/config.public.js` の配置、ローカルサーバー起動、またはブラウザコンソールを確認してください。';
      showAdminBootError(window.__adminBootError ? base + ' 詳細: ' + window.__adminBootError : base);
    }, 2200);
  </script>
  <script type="module">
    import('../assets/js/admin.js').catch(function (error) {
      window.__adminBootError = error && error.message ? String(error.message) : String(error);
      if (window.console && window.console.error) {
        window.console.error('Admin boot failed:', error);
      }
    });
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面: 作品管理 | 秀峰書道サロン</title>
  <link rel="stylesheet" href="../assets/css/site.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-side">
      <h1>秀峰管理</h1>
      <nav class="admin-nav" aria-label="Admin Navigation">
        <a class="is-active" href="./works.html">作品管理</a>
        <a href="./enquiries.html">問い合わせ管理</a>
        <a href="./news.html">お知らせ管理</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h2>作品管理</h2>
        <button class="btn-primary" type="button">新規登録</button>
      </header>

      <section class="admin-panel">
        <div class="admin-filters">
          <input type="search" placeholder="タイトルで検索">
          <select>
            <option>カテゴリ: すべて</option>
            <option>師範1</option><option>師範2</option><option>師範3</option><option>一般</option><option>こども</option>
          </select>
          <select>
            <option>公開状態: すべて</option>
            <option>公開</option><option>下書き</option>
          </select>
        </div>

        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr><th>ID</th><th>タイトル</th><th>カテゴリ</th><th>状態</th><th>更新日</th><th>操作</th></tr>
            </thead>
            <tbody>
              <tr><td>W-001</td><td>行書 臨書作品</td><td>師範1</td><td><span class="badge-pub">公開</span></td><td>2026.04.07</td><td><button class="btn-mini">編集</button></td></tr>
              <tr><td>W-002</td><td>実用書サンプル</td><td>一般</td><td><span class="badge-draft">下書き</span></td><td>2026.04.06</td><td><button class="btn-mini">編集</button></td></tr>
              <tr><td>W-003</td><td>こども 硬筆作品</td><td>こども</td><td><span class="badge-pub">公開</span></td><td>2026.04.04</td><td><button class="btn-mini">編集</button></td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="../assets/js/admin.js"></script>
</body>
</html>

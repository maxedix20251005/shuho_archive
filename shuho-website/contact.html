<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | 秀峰書道サロン</title>
  <meta name="description" content="秀峰書道サロンへのお問い合わせ。1〜2営業日以内にご連絡します。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="秀峰書道サロン">
  <meta property="og:locale" content="ja_JP">
  <meta property="og:title" content="お問い合わせ | 秀峰書道サロン">
  <meta property="og:description" content="秀峰書道サロンへのお問い合わせ。1〜2営業日以内にご連絡します。">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="お問い合わせ | 秀峰書道サロン">
  <meta name="twitter:description" content="秀峰書道サロンへのお問い合わせ。1〜2営業日以内にご連絡します。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/site.css">
  <link rel="shortcut icon" href="./assets/images/logo/favicon-shuho.png" type="image/png">
</head>

<body data-page="contact">
  <header id="site-header"></header>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="hero-kicker">Enquiry</p>
        <h1>お問い合わせ</h1>
        <p>ご相談内容を確認のうえ、1〜2営業日以内にご連絡します。</p>
      </div>
    </section>

    <section class="section section-paper">
      <div class="container form-wrap">
        <form id="enquiry-form" class="enquiry-form" novalidate>
          <div class="form-row">
            <label for="name">お名前 <span class="required">必須</span></label>
            <input id="name" name="name" type="text" maxlength="50" required>
          </div>

          <div class="form-row">
            <label for="email">メールアドレス <span class="required">必須</span></label>
            <input id="email" name="email" type="email" maxlength="255" required>
          </div>

          <div class="form-row">
            <label for="phone">電話番号 <span class="optional">任意</span></label>
            <input id="phone" name="phone" type="tel" maxlength="20" pattern="[0-9\-]{10,13}">
          </div>

          <div class="form-row">
            <label for="enquiry_type">お問い合わせ種別 <span class="required">必須</span></label>
            <select id="enquiry_type" name="enquiry_type" required>
              <option value="">選択してください</option>
              <option value="course">コースについて</option>
              <option value="fee">料金について</option>
              <option value="attendance">通塾について</option>
              <option value="other">その他</option>
            </select>
          </div>

          <div class="form-row">
            <label for="message">お問い合わせ内容 <span class="required">必須</span></label>
            <textarea id="message" name="message" rows="8" maxlength="1000" required></textarea>
          </div>

          <div class="form-row hp-field" aria-hidden="true">
            <label for="website">ウェブサイト</label>
            <input id="website" name="website" type="text" tabindex="-1" autocomplete="off">
          </div>

          <div class="form-row checkbox-row">
            <label class="check-label" for="privacy_agreed">
              <input id="privacy_agreed" name="privacy_agreed" type="checkbox" required>
              <span><a href="./privacy.html">プライバシーポリシー</a>に同意する <span class="required">必須</span></span>
            </label>
          </div>

          <p class="form-note">返信目安: 1〜2営業日以内</p>
          <p id="form-error" class="form-error" role="alert" aria-live="polite"></p>
          <button class="btn-primary" type="submit">送信する</button>
        </form>

        <div id="form-success" class="form-success" hidden>
          <h2>送信ありがとうございます</h2>
          <p>内容を確認し、担当よりご連絡いたします。</p>
          <a class="btn-ghost" href="./index.html">トップへ戻る</a>
        </div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <div id="sp-fixed-cta"></div>

  <script defer src="./assets/js/layout.js"></script>
  <script defer src="./assets/js/site.js"></script>
</body>

</html>
